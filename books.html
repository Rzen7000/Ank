<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books – My Digital Library</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Logo" class="logo-img">
      <span class="site-title">My Library</span>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="books.html">Books</a>
      <a href="about.html">About</a>
      <a href="latest.html">Latest</a>
      <a href="merchandise.html">Merchandise</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>
  <main>
    <h1>Books</h1>
    <div class="book-grid" id="book-list">
      <!-- CMS will inject books here -->
      <p>Loading books from CMS…</p>
    </div>
  </main>
  <footer>
    <p>© 2025 My Company Name</p>
  </footer>
  <!-- We’ll use Decap CMS to generate static data; for simplicity we fetch a JSON file -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    fetch('/books.json')
      .then(res => res.json())
      .then(books => {
        const container = document.getElementById('book-list');
        if (!books.length) {
          container.innerHTML = '<p>No books added yet. Log into /admin to add.</p>';
          return;
        }
        container.innerHTML = books.map(book => `
          <div class="book-card">
            <img src="${book.cover}" alt="${book.title} cover" class="book-cover">
            <h3>${book.title}</h3>
            <p>${book.description || ''}</p>
            <a href="${book.pdf}" class="download-btn" target="_blank">Download PDF</a>
          </div>
        `).join('');
      })
      .catch(err => console.error('Could not load books', err));
  </script>
</body>
</html>
