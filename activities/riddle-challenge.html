<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bennu's Riddle Challenge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background-color: #fdf6e3;
      color: #3e2e1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #f5ede3;
      border-bottom: 2px solid #d4c5a0;
      flex-wrap: wrap;
      gap: 12px;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo-img { height: 32px; width: auto; }
    header .site-title {
      font-weight: bold;
      font-size: 1.2rem;
      color: #b45f2a;
      letter-spacing: 2px;
      font-family: 'Georgia', serif;
    }
    header nav {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    header nav a {
      color: #3e2e1f;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: 0.3s;
    }
    header nav a:hover {
      border-bottom-color: #b45f2a;
      color: #b45f2a;
    }

    main {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
      width: 100%;
    }

    h1 {
      font-size: 2.4rem;
      color: #b45f2a;
      border-left: 5px solid #c9a84c;
      padding-left: 18px;
      margin-bottom: 4px;
      font-family: 'Georgia', serif;
    }
    .subtitle {
      font-size: 1.05rem;
      color: #5c4530;
      margin-bottom: 20px;
    }

    .riddle-container {
      background: #f5ede3;
      border: 2px solid #d4c5a0;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
    }

    .progress-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .progress-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #d4c5a0;
      border: 2px solid #d4c5a0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
      transition: 0.3s;
    }
    .progress-dot.completed {
      background: #4caf50;
      border-color: #4caf50;
      color: white;
    }
    .progress-dot.active {
      background: #b45f2a;
      border-color: #b45f2a;
      color: white;
      transform: scale(1.1);
    }
    .progress-dot .check {
      display: none;
    }
    .progress-dot.completed .check {
      display: inline;
    }
    .progress-dot .num {
      display: inline;
    }
    .progress-dot.completed .num {
      display: none;
    }

    .riddle-number {
      font-size: 0.9rem;
      color: #5c4530;
      margin-bottom: 8px;
    }
    .riddle-text {
      font-size: 1.4rem;
      color: #3e2e1f;
      margin-bottom: 16px;
      line-height: 1.6;
      font-style: italic;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint-area {
      background: #fdf6e3;
      border-left: 4px solid #c9a84c;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #5c4530;
      margin-bottom: 16px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hint-area .hint-text {
      display: none;
    }
    .hint-area .hint-text.show {
      display: inline;
    }
    .hint-area .hint-placeholder {
      color: #d4c5a0;
    }

    .answer-input {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .answer-input input {
      padding: 10px 18px;
      border: 2px solid #d4c5a0;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      background: #fdf6e3;
      color: #3e2e1f;
      width: 250px;
      max-width: 100%;
      transition: 0.3s;
      text-align: center;
      text-transform: uppercase;
    }
    .answer-input input:focus {
      outline: none;
      border-color: #b45f2a;
      box-shadow: 0 0 0 3px rgba(180, 95, 42, 0.15);
    }
    .answer-input button {
      background: #b45f2a;
      color: #fdf6e3;
      border: none;
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: 0.3s;
    }
    .answer-input button:hover {
      background: #8f4a1f;
      transform: scale(1.02);
    }
    .answer-input button.secondary {
      background: #d4c5a0;
      color: #3e2e1f;
    }
    .answer-input button.secondary:hover {
      background: #c9b89a;
    }

    .feedback {
      font-size: 1rem;
      font-style: italic;
      color: #5c4530;
      min-height: 40px;
      margin: 8px 0;
    }
    .feedback.correct {
      color: #2e7d32;
    }
    .feedback.wrong {
      color: #c62828;
    }

    .secret-message {
      background: #fdf6e3;
      border: 2px solid #c9a84c;
      border-radius: 12px;
      padding: 20px 24px;
      margin: 16px auto;
      font-size: 1.2rem;
      color: #3e2e1f;
      max-width: 500px;
      display: none;
    }
    .secret-message.show {
      display: block;
    }
    .secret-message strong {
      color: #b45f2a;
    }

    .riddle-btn {
      background: #b45f2a;
      color: #fdf6e3;
      border: none;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: 0.3s;
      margin: 8px;
    }
    .riddle-btn:hover {
      background: #8f4a1f;
      transform: scale(1.02);
    }
    .riddle-btn.secondary {
      background: #d4c5a0;
      color: #3e2e1f;
    }
    .riddle-btn.secondary:hover {
      background: #c9b89a;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #f5ede3;
      border-top: 2px solid #d4c5a0;
      color: #5c4530;
      font-size: 0.85rem;
      margin-top: auto;
    }
    footer img { height: 1.2em; vertical-align: middle; margin: 0 4px; opacity: 0.6; }

    @media (max-width: 768px) {
      header { flex-direction: column; align-items: flex-start; padding: 12px 16px; }
      header nav { gap: 10px; }
      header nav a { font-size: 0.8rem; }
      h1 { font-size: 1.8rem; }
      .riddle-container { padding: 20px; }
      .riddle-text { font-size: 1.2rem; }
      .answer-input input { width: 180px; }
    }
    @media (max-width: 480px) {
      main { padding: 24px 16px; }
      h1 { font-size: 1.4rem; }
      .riddle-container { padding: 16px; }
      .riddle-text { font-size: 1rem; min-height: 60px; }
      .answer-input input { width: 140px; font-size: 0.9rem; padding: 8px 12px; }
      .answer-input button { font-size: 0.9rem; padding: 8px 16px; }
      .progress-dot { width: 24px; height: 24px; font-size: 0.7rem; }
      .secret-message { font-size: 1rem; padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="../images/ANKAA LOGO.jpg" alt="Logo" class="logo-img">
      <span class="site-title">3ANKAA</span>
    </div>
    <nav>
      <a href="../home.html">The Imaginarium</a>
      <a href="../map.html">Explore the Map</a>
      <a href="../books.html">Quest Packs</a>
      <a href="../about.html">The Storykeeper</a>
      <a href="../latest.html">Bennu's Bulletin</a>
    </nav>
  </header>

  <main>
    <h1>🧩 Bennu's Riddle Challenge</h1>
    <p class="subtitle">Solve 7 riddles to reveal a secret message. Hints available if you're stuck!</p>

    <div class="riddle-container">
      <div class="progress-bar" id="progressBar"></div>

      <div class="riddle-number" id="riddleNumber">Riddle 1 of 7</div>
      <div class="riddle-text" id="riddleText"></div>

      <div class="hint-area" id="hintArea">
        <span class="hint-placeholder">💡 Click "Show Hint" for a clue</span>
        <span class="hint-text" id="hintText"></span>
      </div>

      <div class="answer-input">
        <input type="text" id="answerInput" placeholder="Type your answer..." maxlength="20" autocomplete="off">
        <button id="submitBtn">Submit</button>
        <button class="secondary" id="hintBtn">💡 Show Hint</button>
        <button class="secondary" id="skipBtn">⏭️ Skip</button>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="secret-message" id="secretMessage">
        <strong>🎉 Secret Message Unlocked!</strong><br>
        <span id="secretText"></span>
      </div>

      <div>
        <button class="riddle-btn secondary" id="resetBtn">🔄 Start Over</button>
      </div>
    </div>
  </main>

  <footer>
    <p>
      <img src="../images/hoopoe-footprint.png" alt="Hoopoe footprint">
      <img src="../images/hoopoe-footprint.png" alt="Hoopoe footprint">
      © 2026 3ANKAA
      <img src="../images/hoopoe-footprint.png" alt="Hoopoe footprint">
      <img src="../images/hoopoe-footprint.png" alt="Hoopoe footprint">
    </p>
  </footer>

  <script>
    // ===== RIDDLES =====
    const RIDDLES = [
      {
        question: "I have cities, but no houses. I have mountains, but no trees. I have water, but no fish. What am I?",
        answer: "MAP",
        hint: "🌍 You look at it to find your way."
      },
      {
        question: "I have keys but open no locks. I have space but no room. You can enter, but can't go inside. What am I?",
        answer: "KEYBOARD",
        hint: "⌨️ You use it to type your answers."
      },
      {
        question: "I have a face and two hands, but no arms or legs. I tell time but don't speak. What am I?",
        answer: "CLOCK",
        hint: "⏰ You look at me to know when it's snack time."
      },
      {
        question: "I have a neck but no head. I have two arms but no hands. What am I?",
        answer: "SHIRT",
        hint: "👕 You wear me, but I have no body."
      },
      {
        question: "I am light as a feather, yet the strongest person can't hold me for long. What am I?",
        answer: "BREATH",
        hint: "💨 Everyone has me, but nobody can keep me."
      },
      {
        question: "I have a bed but never sleep. I have a mouth but never eat. I run but never walk. What am I?",
        answer: "RIVER",
        hint: "🌊 I flow through Egypt."
      },
      {
        question: "I am always hungry, I must always be fed. The finger I touch, will soon turn red. What am I?",
        answer: "FIRE",
        hint: "🔥 I give warmth but can also burn."
      }
    ];

    // ===== SECRET PHRASES (with morals and values) =====
    const SECRET_PHRASES = [
      "WISDOM BEGINS WITH WONDER",
      "CURIOSITY IS THE KEY TO KNOWLEDGE",
      "BE BRAVE ENOUGH TO ASK QUESTIONS",
      "KINDNESS IS THE GREATEST WISDOM",
      "LEARNING NEVER ENDS",
      "IMAGINATION LEADS TO DISCOVERY",
      "COURAGE COMES FROM CURIOSITY",
      "HONESTY OPENS ALL DOORS",
      "FRIENDSHIP IS THE REAL TREASURE",
      "PATIENCE REWARDS THE PATIENT"
    ];

    // ===== GAME STATE =====
    let currentRiddle = 0;
    let completed = [];
    let hintsUsed = [];
    let secretPhrase = '';

    // ===== DOM ELEMENTS =====
    const progressBar = document.getElementById('progressBar');
    const riddleNumber = document.getElementById('riddleNumber');
    const riddleText = document.getElementById('riddleText');
    const hintArea = document.getElementById('hintArea');
    const hintText = document.getElementById('hintText');
    const answerInput = document.getElementById('answerInput');
    const feedback = document.getElementById('feedback');
    const secretMessage = document.getElementById('secretMessage');
    const secretText = document.getElementById('secretText');

    // ===== INIT =====
    function initRiddles() {
      currentRiddle = 0;
      completed = [];
      hintsUsed = [];
      secretPhrase = SECRET_PHRASES[Math.floor(Math.random() * SECRET_PHRASES.length)];
      
      secretMessage.classList.remove('show');
      feedback.textContent = '';
      feedback.className = 'feedback';
      answerInput.value = '';
      answerInput.disabled = false;
      
      renderProgress();
      renderRiddle();
    }

    function renderProgress() {
      progressBar.innerHTML = '';
      RIDDLES.forEach((_, index) => {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        if (completed.includes(index)) {
          dot.classList.add('completed');
          dot.innerHTML = '<span class="check">✓</span>';
        } else if (index === currentRiddle) {
          dot.classList.add('active');
          dot.innerHTML = `<span class="num">${index + 1}</span>`;
        } else {
          dot.innerHTML = `<span class="num">${index + 1}</span>`;
        }
        progressBar.appendChild(dot);
      });
    }

    function renderRiddle() {
      const riddle = RIDDLES[currentRiddle];
      riddleNumber.textContent = `Riddle ${currentRiddle + 1} of ${RIDDLES.length}`;
      riddleText.textContent = riddle.question;
      
      // Reset hint
      hintText.classList.remove('show');
      hintText.textContent = riddle.hint;
      hintArea.querySelector('.hint-placeholder').style.display = 'inline';
      
      answerInput.value = '';
      answerInput.disabled = false;
      answerInput.focus();
      
      feedback.textContent = '';
      feedback.className = 'feedback';
    }

    function submitAnswer() {
      const answer = answerInput.value.trim().toUpperCase();
      if (!answer) {
        feedback.textContent = '📝 Please type an answer first!';
        feedback.className = 'feedback';
        return;
      }

      const riddle = RIDDLES[currentRiddle];
      const isCorrect = answer === riddle.answer.toUpperCase();

      if (isCorrect) {
        completed.push(currentRiddle);
        feedback.textContent = `✅ Correct! "The answer is ${riddle.answer}". Bennu taps once!`;
        feedback.className = 'feedback correct';
        answerInput.disabled = true;

        if (completed.length === RIDDLES.length) {
          // All riddles solved!
          setTimeout(() => {
            showSecretMessage();
          }, 800);
        } else {
          // Move to next riddle
          setTimeout(() => {
            // Find the next unsolved riddle
            let next = currentRiddle + 1;
            while (next < RIDDLES.length && completed.includes(next)) {
              next++;
            }
            if (next < RIDDLES.length) {
              currentRiddle = next;
              renderProgress();
              renderRiddle();
            } else {
              // All riddles are solved, but for some reason not all completed
              // Find first uncompleted
              for (let i = 0; i < RIDDLES.length; i++) {
                if (!completed.includes(i)) {
                  currentRiddle = i;
                  break;
                }
              }
              renderProgress();
              renderRiddle();
            }
          }, 1500);
        }
      } else {
        feedback.textContent = `❌ Not quite. Try again! (Hint: Think differently)`;
        feedback.className = 'feedback wrong';
        answerInput.value = '';
        answerInput.focus();
      }
    }

    function showHint() {
      const riddle = RIDDLES[currentRiddle];
      hintText.textContent = riddle.hint;
      hintText.classList.add('show');
      hintArea.querySelector('.hint-placeholder').style.display = 'none';
      feedback.textContent = '💡 Bennu whispers a clue...';
      feedback.className = 'feedback';
    }

    function skipRiddle() {
      const riddle = RIDDLES[currentRiddle];
      feedback.textContent = `⏭️ Skipped! The answer was "${riddle.answer}".`;
      feedback.className = 'feedback';
      
      completed.push(currentRiddle);
      answerInput.disabled = true;

      if (completed.length === RIDDLES.length) {
        setTimeout(() => {
          showSecretMessage();
        }, 800);
      } else {
        setTimeout(() => {
          let next = currentRiddle + 1;
          while (next < RIDDLES.length && completed.includes(next)) {
            next++;
          }
          if (next < RIDDLES.length) {
            currentRiddle = next;
            renderProgress();
            renderRiddle();
          } else {
            for (let i = 0; i < RIDDLES.length; i++) {
              if (!completed.includes(i)) {
                currentRiddle = i;
                break;
              }
            }
            renderProgress();
            renderRiddle();
          }
        }, 1500);
      }
    }

    function showSecretMessage() {
      secretText.textContent = secretPhrase;
      secretMessage.classList.add('show');
      feedback.textContent = '🎉 TAP TAP TAP! You\'ve unlocked the secret message!';
      feedback.className = 'feedback correct';
    }

    // ===== EVENT LISTENERS =====
    document.getElementById('submitBtn').addEventListener('click', submitAnswer);
    document.getElementById('hintBtn').addEventListener('click', showHint);
    document.getElementById('skipBtn').addEventListener('click', skipRiddle);
    document.getElementById('resetBtn').addEventListener('click', initRiddles);

    answerInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        submitAnswer();
      }
    });

    // ===== INIT =====
    initRiddles();
    console.log('🧩 Bennu\'s Riddle Challenge loaded!');
  </script>
</body>
</html>
