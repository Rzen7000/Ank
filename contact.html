<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – 3ANKAA</title>
  <style>
    /* ===== WARM EGYPTIAN COLOR PALETTE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background-color: #fdf6e3;
      color: #3e2e1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #f5ede3;
      border-bottom: 2px solid #d4c5a0;
      flex-wrap: wrap;
      gap: 12px;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo-img {
      height: 32px;
      width: auto;
    }
    header .site-title {
      font-weight: bold;
      font-size: 1.2rem;
      color: #b45f2a;
      letter-spacing: 2px;
      font-family: 'Georgia', serif;
    }
    header nav {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    header nav a {
      color: #3e2e1f;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: 0.3s;
    }
    header nav a:hover {
      border-bottom-color: #b45f2a;
      color: #b45f2a;
    }

    /* --- MAIN --- */
    main {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
      width: 100%;
    }

    main h1 {
      font-size: 2.4rem;
      color: #b45f2a;
      border-left: 5px solid #c9a84c;
      padding-left: 18px;
      margin-bottom: 24px;
      font-family: 'Georgia', serif;
    }

    main p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #3e2e1f;
      margin-bottom: 16px;
    }

    main a {
      color: #b45f2a;
      text-decoration: none;
      border-bottom: 1px dotted #c9a84c;
      transition: 0.3s;
    }
    main a:hover {
      color: #8f4a1f;
      border-bottom-color: #b45f2a;
    }

    main strong {
      color: #b45f2a;
    }

    /* --- FORM --- */
    form {
      background: #f5ede3;
      border: 2px solid #d4c5a0;
      border-radius: 16px;
      padding: 24px 28px;
      margin: 24px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    form label {
      display: flex;
      flex-direction: column;
      font-weight: 500;
      color: #3e2e1f;
      font-size: 0.95rem;
      gap: 4px;
    }
    form input,
    form textarea {
      padding: 10px 14px;
      border: 2px solid #d4c5a0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      background: #fdf6e3;
      color: #3e2e1f;
      transition: 0.3s;
      width: 100%;
    }
    form input:focus,
    form textarea:focus {
      outline: none;
      border-color: #b45f2a;
      box-shadow: 0 0 0 3px rgba(180, 95, 42, 0.15);
    }
    form textarea {
      min-height: 120px;
      resize: vertical;
    }
    form button {
      background: #b45f2a;
      color: #fdf6e3;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Georgia', serif;
      align-self: flex-start;
    }
    form button:hover {
      background: #8f4a1f;
      transform: scale(1.02);
    }

    /* --- SCROLL REVEAL --- */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* --- FOOTER --- */
    footer {
      text-align: center;
      padding: 20px;
      background: #f5ede3;
      border-top: 2px solid #d4c5a0;
      color: #5c4530;
      font-size: 0.85rem;
      margin-top: auto;
    }
    footer img {
      height: 1.2em;
      vertical-align: middle;
      margin: 0 4px;
      opacity: 0.6;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        padding: 12px 16px;
      }
      header nav {
        gap: 10px;
      }
      header nav a {
        font-size: 0.8rem;
      }
      main h1 {
        font-size: 1.8rem;
      }
      main p {
        font-size: 0.95rem;
      }
      form {
        padding: 18px 20px;
      }
      form label {
        font-size: 0.9rem;
      }
      form input,
      form textarea {
        font-size: 0.95rem;
        padding: 8px 12px;
      }
      form button {
        font-size: 0.95rem;
        padding: 10px 24px;
      }
    }

    @media (max-width: 480px) {
      main {
        padding: 24px 16px;
      }
      main h1 {
        font-size: 1.4rem;
        padding-left: 12px;
      }
      main p {
        font-size: 0.9rem;
      }
      header nav a {
        font-size: 0.7rem;
      }
      form {
        padding: 14px 16px;
        border-radius: 12px;
      }
      form label {
        font-size: 0.85rem;
      }
      form input,
      form textarea {
        font-size: 0.9rem;
        padding: 8px 10px;
        border-radius: 8px;
      }
      form textarea {
        min-height: 100px;
      }
      form button {
        font-size: 0.85rem;
        padding: 8px 20px;
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

  <!-- Scroll Reveal Script -->
  <script>
    (function() {
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initReveals);
      } else {
        initReveals();
      }
      function initReveals() {
        const reveals = document.querySelectorAll('.reveal');
        if (reveals.length === 0) return;
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
            }
          });
        }, { threshold: 0.15, rootMargin: '0px 0px -20px 0px' });
        reveals.forEach(el => observer.observe(el));
      }
    })();
  </script>
</body>
</html>
