<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – My Digital Library</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo"><img src="images/logo.png" alt="Logo"><span>My Library</span></div>
    <nav>...</nav>
  </header>
  <main>
    <h1>Contact</h1>
    <p>Email: <a href="mailto:hello@mycompany.com">hello@mycompany.com</a></p>
    <!-- simple contact form (no backend) – just mailto -->
    <form action="mailto:hello@mycompany.com" method="post" enctype="text/plain">
      <label>Name: <input type="text" name="name"></label>
      <label>Message: <textarea name="message"></textarea></label>
      <button type="submit">Send (opens your email app)</button>
    </form>
  </main>
  <footer>...</footer>
</body>
</html>
